version: '3.9'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sevasetu
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  api:
    build: ./apps/api
    env_file:
      - ./apps/api/.env.example
    ports:
      - '4000:4000'
    depends_on:
      - db

  web:
    build: ./apps/web
    env_file:
      - ./apps/web/.env.example
    ports:
      - '3000:3000'
    depends_on:
      - api

volumes:
  pgdata:
