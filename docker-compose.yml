version: '3.9'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: seva_setu
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/sql:/docker-entrypoint-initdb.d

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - backend/.env.example
    ports:
      - '5000:5000'
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:5000
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  pgdata:
